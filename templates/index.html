<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker & Chat</title>
    <style>
        /* Круглая кнопка поддержки */
.support-trigger {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: #007bff;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: 0.2s;
}
.support-trigger:hover { transform: scale(1.1); }

/* Боковая панель чата */
.support-panel {
    position: fixed;
    top: 0;
    right: -320px; /* Изначально спрятана справа */
    width: 300px;
    height: 100%;
    background: white;
    box-shadow: -4px 0 10px rgba(0,0,0,0.2);
    z-index: 999;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    padding: 15px;
    text-align: left;
}
body.dark .support-panel { background: #222; color: white; }
.support-panel.open { right: 0; }
.support-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
.support-box { flex-grow: 1; overflow-y: auto; margin: 10px 0; padding: 5px; border: 1px solid #eee; border-radius: 5px; }
body.dark .support-box { border-color: #444; }

        body { font-family: 'Segoe UI', sans-serif; transition: 0.3s; text-align: center; margin: 0; padding: 10px; background: #eee; }
        body.dark { background: #1a1a1a; color: white; }
        .container { max-width: 500px; margin: auto; }
        .box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body.dark .box { background: #333; color: white; }
        input { padding: 10px; margin: 5px; width: 80%; border-radius: 8px; border: 1px solid #ccc; }
        body.dark input { background: #222; color: white; border-color: #555; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; background: #28a745; color: white; font-weight: bold; }
        #chat-box { height: 180px; overflow-y: auto; text-align: left; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background: #fafafa; border-radius: 8px; }
        body.dark #chat-box { background: #222; border-color: #444; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .logout-btn { background: #dc3545; font-size: 12px; padding: 5px 10px; float: right; }

        /* Стили для таблицы топа */
        .top-table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        .top-table th, .top-table td { padding: 8px; border-bottom: 1px solid #ddd; }
        body.dark .top-table th, body.dark .top-table td { border-bottom: 1px solid #444; }
        .top-table th { font-weight: bold; color: #28a745; }

        /* Радужный ник создателя */
        @keyframes rainbow {
            0% { color: #ff007f; }
            33% { color: #00f5d4; }
            66% { color: #7b2cbf; }
            100% { color: #ff007f; }
        }

        .admin-rainbow-nick {
            animation: rainbow 3s linear infinite !important;
            font-weight: bold !important;
            text-shadow: 0 0 8px rgba(0, 245, 212, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: left; margin-bottom: 10px;">
            <button class="btn" style="background:#6c757d;" onclick="toggleTheme()">🌓 Тема</button>
            <button id="logout" class="btn logout-btn" style="display:none;" onclick="logout()">Выйти</button>
        </div>

        <div id="auth" class="box" style="margin-top: 50px;">
            <h2>Войти в игру</h2>
            <input type="text" id="user" placeholder="Ваш ник"><br>
            <input type="password" id="pass" placeholder="Пароль"><br>
            <button class="btn" onclick="login()">Играть</button>
        </div>

        <div id="game" style="display:none;">
            <div class="box">
                <h1 style="font-size: 45px; margin: 10px 0;">💰 <span id="balance">0</span></h1>
                <button class="btn" style="width: 100%; height: 80px; font-size: 24px;" onclick="doClick()">КЛИК!</button>
                <p>Клик: x<span id="p-mult">1</span> | Авто: <span id="p-auto">0</span></p>
            </div>

            <div class="box">
                <h3>Магазин</h3>
                <div class="shop-grid">
                    <button class="btn" style="background:#007bff" onclick="buy('double')">Множитель<br>(<span id="c-double">100</span> 💰)</button>
                    <button class="btn" style="background:#007bff" onclick="buy('auto')">Автоклик<br>(<span id="c-auto">50</span> 💰)</button>
                    <button class="btn" style="background:#ff4757" onclick="buy('color_red')">🔴 Красный Ник<br>(1,000 💰)</button>
                    <button class="btn" style="background:#ffa500" onclick="buy('color_gold')">👑 Золотой Ник<br>(5,000 💰)</button>
                </div>
            </div>

            <div class="box">
                <h3>Чат (обновление 5с)</h3>
                <div id="chat-box"></div>
                <input type="text" id="chat-msg" placeholder="Текст..." style="width: 65%;">
                <button class="btn" onclick="sendMsg()">></button>
            </div>

            <div class="box">
                <h3>🏆 Топ-10 Игроков</h3>
                <table class="top-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Место</th>
                            <th>Игрок</th>
                            <th style="text-align: right;">Клики 💰</th>
                        </tr>
                    </thead>
                    <tbody id="top-list"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="support-btn" class="support-trigger" style="display:none;" onclick="toggleSupportPanel()">💬</div>

<div id="support-panel" class="support-panel">
    <div class="support-header">
        <h3>Поддержка 🛠️</h3>
        <button class="btn" style="padding:5px 10px; background:#dc3545;" onclick="toggleSupportPanel()">X</button>
    </div>
    <div id="support-box" class="support-box"></div>
    <div style="display:flex;">
        <input type="text" id="support-msg" placeholder="Ваш вопрос..." style="width:75%; margin:0; padding:8px;">
        <button class="btn" style="width:25%;" onclick="sendSupportMsg()">></button>
    </div>
</div>

    <script>
        let user = "";

        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
            }

            const savedUser = localStorage.getItem('username');
            if (savedUser) {
                user = savedUser;
                showGameInterface();
                refreshUserData();
                startLoops();
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }

        async function login() {
            const usernameInput = document.getElementById('user').value.trim();
            const passwordInput = document.getElementById('pass').value.trim();
            if(!usernameInput) return;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: usernameInput, password: passwordInput})
                });
                const d = await res.json();

                if(d.success) {
                    user = usernameInput;
                    localStorage.setItem('username', user);
                    showGameInterface();
                    updateUI(d.data);
                    startLoops();
                } else {
                    alert(d.message);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function showGameInterface() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('logout').style.display = 'inline-block';
            document.getElementById('support-btn').style.display = 'flex';
        }

        function logout() {
            localStorage.removeItem('username');
            location.reload();
        }

        function startLoops() {
            setInterval(refreshChat, 5000);
            setInterval(sendAutoClickToServer, 3000);
            setInterval(refreshTop, 3000);
            refreshTop();
        }

        async function refreshUserData() {
            if (!user) return;
            try {
                const res = await fetch('/get_profile', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user})
                });
                const d = await res.json();
                if (d.success) updateUI(d.data);
            } catch(e) {
                console.error(e);
            }
        }

        function updateUI(data) {
            document.getElementById('balance').innerText = data.clicks;
            document.getElementById('p-mult').innerText = data.multiplier;
            document.getElementById('p-auto').innerText = data.auto_clickers;
            document.getElementById('c-double').innerText = 100 * data.multiplier;
            document.getElementById('c-auto').innerText = 50 * (data.auto_clickers + 1);
        }

        async function doClick() {
            if(!user) return;
            try {
                const res = await fetch('/click', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user})
                });
                const d = await res.json();
                if(d.clicks !== undefined) {
                    const balanceEl = document.getElementById('balance');
                    balanceEl.innerText = d.clicks;

                    if(d.is_crit) {
                        balanceEl.style.color = '#ff1744';
                        balanceEl.innerText = d.clicks + " 💥 КРИТ +" + d.bonus + "!";
                        setTimeout(() => {
                            balanceEl.style.color = document.body.classList.contains('dark') ? 'white' : 'black';
                            balanceEl.innerText = d.clicks;
                        }, 1000);
                    }
                }
            } catch(e) {}
        }

        async function buy(item) {
            if(!user) return;
            try {
                const res = await fetch('/buy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, item: item})
                });
                const d = await res.json();
                if(d.success) {
                    updateUI({clicks: d.clicks, multiplier: d.multiplier, auto_clickers: d.auto});
                } else if(d.message) {
                    alert(d.message);
                }
            } catch(e) {}
        }

        async function sendAutoClickToServer() {
            if(!user) return;
            try {
                const res = await fetch('/autoclick_server', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user})
                });
                const d = await res.json();
                if(d.success) {
                    document.getElementById('balance').innerText = d.clicks;
                }
            } catch(e) {}
        }

        async function sendMsg() {
            const input = document.getElementById('chat-msg');
            const text = input.value.trim();
            if(!text || !user) return;
            input.value = "";
            try {
                await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, text: text})
                });
                refreshChat();
            } catch(e) {}
        }

        async function refreshChat() {
            try {
                const res = await fetch('/chat');
                const msgs = await res.json();

                let html = "";
                if (Array.isArray(msgs)) {
                    msgs.forEach(m => {
                        let userColor = m.color || '#28a745';
                        let nickHTML = "";

                        if (m.user === 'admin') {
                            nickHTML = `<b class="admin-rainbow-nick">${m.user}:</b>`;
                        } else {
                            nickHTML = `<b style="color: ${userColor};">${m.user}:</b>`;
                        }

                        html += `<div><span style="color: #aaa; font-size: 0.85rem;">[${m.time}]</span> ${nickHTML} <span>${m.text}</span></div>`;
                    });
                }

                document.getElementById('chat-box').innerHTML = html;

                const cb = document.getElementById('chat-box');
                if (cb) {
                    cb.scrollTop = cb.scrollHeight;
                }
            } catch(e) {
                console.error("Ошибка обновления чата:", e);
            }
        }

        async function refreshTop() {
            try {
                const res = await fetch('/top');
                const topData = await res.json();

                let html = "";
                if (Array.isArray(topData)) {
                    topData.forEach((player, index) => {
                        let medal = index + 1;
                        if (medal === 1) medal = "🥇";
                        else if (medal === 2) medal = "🥈";
                        else if (medal === 3) medal = "🥉";
                        else medal = `🏅 ${medal}`;

                        let userColor = player.name_color || '#28a745';
                        let playerNickHTML = "";

                        if (player.username === 'admin') {
                            playerNickHTML = `<span class="admin-rainbow-nick">${player.username}</span>`;
                        } else {
                            playerNickHTML = `<span style="color: ${userColor}; font-weight: bold;">${player.username}</span>`;
                        }

                        html += `<tr>
                            <td><b>${medal}</b></td>
                            <td>${playerNickHTML}</td>
                            <td style="text-align: right; font-weight: bold;">${player.clicks}</td>
                        </tr>`;
                    });
                }
                document.getElementById('top-list').innerHTML = html;
            } catch(e) {
                console.error("Ошибка загрузки топа:", e);
            }
        }
        function toggleSupportPanel() {
    const panel = document.getElementById('support-panel');
    panel.classList.toggle('open');
    if(panel.classList.contains('open')) refreshSupport();
}

async function sendSupportMsg() {
    const input = document.getElementById('support-msg');
    const text = input.value.trim();
    if(!text || !user) return;
    input.value = "";

    try {
        await fetch('/support', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, text: text, sender: user})
        });
        refreshSupport();
    } catch(e) {}
}

async function refreshSupport() {
    if(!user || !document.getElementById('support-panel').classList.contains('open')) return;
    try {
        const res = await fetch(`/support?username=${user}`);
        const msgs = await res.json();
        let html = "";
        msgs.forEach(m => {
            if(m.sender === 'admin') {
                html += `<div style="margin-bottom:8px;"><b style="color:#007bff;">Админ:</b> <span>${m.text}</span> <small style="color:#888;">${m.time}</small></div>`;
            } else {
                html += `<div style="margin-bottom:8px;"><b style="color:#28a745;">Вы:</b> <span>${m.text}</span> <small style="color:#888;">${m.time}</small></div>`;
            }
        });
        const sb = document.getElementById('support-box');
        sb.innerHTML = html;
        sb.scrollTop = sb.scrollHeight;
    } catch(e) {}
}
    </script>
</body>
</html>
